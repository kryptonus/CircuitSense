<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #0a0c0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" style="font-family: 'Courier New', monospace;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4488ff"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1017"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  <!-- Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,136,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#00ff88" font-size="22" font-weight="bold">CircuitSense — System Architecture</text>
  <text x="600" y="65" text-anchor="middle" fill="#7a8899" font-size="11">AI Electronics Lab Partner | Gemini Live Agent Challenge</text>
  
  <!-- ═══ USER / BROWSER SECTION ═══ -->
  <rect x="30" y="90" width="280" height="280" rx="8" fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <text x="170" y="115" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">BROWSER (Frontend)</text>
  
  <!-- Camera -->
  <rect x="50" y="135" width="110" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="105" y="155" text-anchor="middle" fill="#e0e6f0" font-size="10">Camera</text>
  <text x="105" y="170" text-anchor="middle" fill="#7a8899" font-size="8">640x480 → 320x240</text>
  
  <!-- Microphone -->
  <rect x="180" y="135" width="110" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="235" y="155" text-anchor="middle" fill="#e0e6f0" font-size="10">Microphone</text>
  <text x="235" y="170" text-anchor="middle" fill="#7a8899" font-size="8">PCM 16kHz mono</text>
  
  <!-- UI Panels -->
  <rect x="50" y="200" width="240" height="55" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="170" y="220" text-anchor="middle" fill="#e0e6f0" font-size="10">Rich Analysis Sidebar</text>
  <text x="170" y="235" text-anchor="middle" fill="#7a8899" font-size="8">Health | Inventory | Protocols | Datasheets | Ideas</text>
  
  <!-- Text Input -->
  <rect x="50" y="270" width="110" height="40" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="105" y="293" text-anchor="middle" fill="#e0e6f0" font-size="10">Text Chat</text>
  
  <!-- Audio Playback -->
  <rect x="180" y="270" width="110" height="40" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="235" y="293" text-anchor="middle" fill="#e0e6f0" font-size="10">Audio Playback</text>
  
  <rect x="50" y="325" width="240" height="30" rx="5" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="170" y="344" text-anchor="middle" fill="#00ff88" font-size="9">Web Speech API (Recognition + Synthesis)</text>
  
  <!-- ═══ WEBSOCKET CONNECTION ═══ -->
  <line x1="310" y1="230" x2="420" y2="230" stroke="#00ff88" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="420" y1="250" x2="310" y2="250" stroke="#4488ff" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>
  <text x="365" y="220" text-anchor="middle" fill="#00ff88" font-size="9">WebSocket</text>
  <text x="365" y="268" text-anchor="middle" fill="#4488ff" font-size="9">JSON + Audio</text>
  
  <!-- ═══ BACKEND SERVER ═══ -->
  <rect x="420" y="90" width="340" height="280" rx="8" fill="rgba(255,170,0,0.04)" stroke="rgba(255,170,0,0.2)" stroke-width="1"/>
  <text x="590" y="115" text-anchor="middle" fill="#ffaa00" font-size="13" font-weight="bold">FASTAPI SERVER (Cloud Run)</text>
  
  <!-- WebSocket Handler -->
  <rect x="440" y="135" width="140" height="50" rx="5" fill="#111318" stroke="#ffaa00" stroke-width="1"/>
  <text x="510" y="155" text-anchor="middle" fill="#e0e6f0" font-size="10">WebSocket Handler</text>
  <text x="510" y="170" text-anchor="middle" fill="#7a8899" font-size="8">Route messages</text>
  
  <!-- Live API Bridge -->
  <rect x="600" y="135" width="140" height="50" rx="5" fill="#111318" stroke="#ffaa00" stroke-width="1"/>
  <text x="670" y="155" text-anchor="middle" fill="#e0e6f0" font-size="10">Live API Bridge</text>
  <text x="670" y="170" text-anchor="middle" fill="#7a8899" font-size="8">Audio + Video relay</text>
  
  <!-- Analysis Engine -->
  <rect x="440" y="210" width="300" height="55" rx="5" fill="rgba(68,136,255,0.08)" stroke="rgba(68,136,255,0.3)" stroke-width="1"/>
  <text x="590" y="232" text-anchor="middle" fill="#4488ff" font-size="11" font-weight="bold">Structured Analysis Engine</text>
  <text x="590" y="248" text-anchor="middle" fill="#7a8899" font-size="8">JSON extraction → Components, Health, Protocols, Ideas, BOM</text>
  
  <!-- Text Reply -->
  <rect x="440" y="280" width="140" height="45" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="510" y="300" text-anchor="middle" fill="#e0e6f0" font-size="10">Text Reply Engine</text>
  <text x="510" y="313" text-anchor="middle" fill="#7a8899" font-size="8">ASCII diagrams</text>
  
  <!-- Keepalive -->
  <rect x="600" y="280" width="140" height="45" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="670" y="300" text-anchor="middle" fill="#e0e6f0" font-size="10">Keepalive + Ping</text>
  <text x="670" y="313" text-anchor="middle" fill="#7a8899" font-size="8">15s interval</text>
  
  <rect x="440" y="338" width="300" height="22" rx="4" fill="rgba(255,170,0,0.1)" stroke="rgba(255,170,0,0.3)"/>
  <text x="590" y="353" text-anchor="middle" fill="#ffaa00" font-size="8">Python 3.11 | FastAPI | uvicorn | wsproto | google-genai</text>
  
  <!-- ═══ GEMINI MODELS ═══ -->
  <rect x="830" y="90" width="340" height="200" rx="8" fill="rgba(68,136,255,0.04)" stroke="rgba(68,136,255,0.2)" stroke-width="1"/>
  <text x="1000" y="115" text-anchor="middle" fill="#4488ff" font-size="13" font-weight="bold">GOOGLE GEMINI AI</text>
  
  <!-- Live API -->
  <rect x="850" y="135" width="300" height="55" rx="5" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="1000" y="155" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Gemini 2.5 Flash Native Audio</text>
  <text x="1000" y="172" text-anchor="middle" fill="#7a8899" font-size="9">Live API | Real-time voice + vision | Streaming audio</text>
  
  <!-- Text Model -->
  <rect x="850" y="210" width="300" height="55" rx="5" fill="rgba(68,136,255,0.06)" stroke="rgba(68,136,255,0.3)" stroke-width="1"/>
  <text x="1000" y="230" text-anchor="middle" fill="#4488ff" font-size="11" font-weight="bold">Gemini 2.5 Flash (Text)</text>
  <text x="1000" y="247" text-anchor="middle" fill="#7a8899" font-size="9">Structured JSON analysis | Text replies | ASCII diagrams</text>
  
  <!-- Arrows: Backend → Gemini -->
  <line x1="760" y1="160" x2="845" y2="160" stroke="#00ff88" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="800" y="153" text-anchor="middle" fill="#00ff88" font-size="8">Audio+Video</text>
  
  <line x1="760" y1="237" x2="845" y2="237" stroke="#4488ff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="800" y="230" text-anchor="middle" fill="#4488ff" font-size="8">Image+Prompt</text>
  
  <!-- ═══ GOOGLE CLOUD SECTION ═══ -->
  <rect x="420" y="410" width="750" height="110" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="795" y="435" text-anchor="middle" fill="#e0e6f0" font-size="13" font-weight="bold">Google Cloud Platform</text>
  
  <rect x="440" y="450" width="130" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="505" y="472" text-anchor="middle" fill="#00ff88" font-size="10">Cloud Run</text>
  <text x="505" y="487" text-anchor="middle" fill="#7a8899" font-size="8">Container hosting</text>
  
  <rect x="590" y="450" width="130" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="655" y="472" text-anchor="middle" fill="#00ff88" font-size="10">Cloud Build</text>
  <text x="655" y="487" text-anchor="middle" fill="#7a8899" font-size="8">Docker CI/CD</text>
  
  <rect x="740" y="450" width="130" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="805" y="472" text-anchor="middle" fill="#00ff88" font-size="10">Artifact Registry</text>
  <text x="805" y="487" text-anchor="middle" fill="#7a8899" font-size="8">Container images</text>
  
  <rect x="890" y="450" width="130" height="50" rx="5" fill="#111318" stroke="#2a3340" stroke-width="1"/>
  <text x="955" y="472" text-anchor="middle" fill="#4488ff" font-size="10">Gemini API</text>
  <text x="955" y="487" text-anchor="middle" fill="#7a8899" font-size="8">AI backbone</text>
  
  <!-- ═══ DATA FLOW LABELS ═══ -->
  <rect x="30" y="550" width="1140" height="130" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#e0e6f0" font-size="12" font-weight="bold">Dual-Engine Data Flow</text>
  
  <!-- Engine 1 -->
  <circle cx="80" cy="610" r="8" fill="#00ff88"/>
  <text x="95" y="614" fill="#00ff88" font-size="10" font-weight="bold">Engine 1: Real-Time Voice (Gemini Live API)</text>
  <text x="95" y="630" fill="#7a8899" font-size="9">Mic → PCM 16kHz → WebSocket → Live API → Streaming Audio → Browser Playback</text>
  
  <!-- Engine 2 -->
  <circle cx="80" cy="660" r="8" fill="#4488ff"/>
  <text x="95" y="664" fill="#4488ff" font-size="10" font-weight="bold">Engine 2: Structured Analysis (Gemini 2.5 Flash)</text>
  <text x="95" y="680" fill="#7a8899" font-size="9">Camera Frame → JPEG → Text API → JSON → Component Inventory, Health, Protocols, Datasheets, Ideas, BOM</text>
  
  <!-- Hashtag -->
  <text x="1140" y="695" text-anchor="end" fill="rgba(0,255,136,0.4)" font-size="9">#GeminiLiveAgentChallenge</text>
</svg>
</body>
</html>
